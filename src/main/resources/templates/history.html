<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Completed Donations</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" th:href="@{/css/style.css}">

</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-success text-white">

            <h2 class="text-center mb-0">
                Completed Donations
            </h2>

        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover table-striped text-center align-middle">

                <thead class="table-dark">

                    <tr>

                        <th>ID</th>

                        <th>Food</th>

                        <th>Donor</th>

                        <th>Quantity</th>

                        <th>Status</th>

                        <th>Pickup Date</th>

                        <th>Pickup Time</th>

                    </tr>

                </thead>

                <tbody>

                <tr th:each="donation : ${donations}">

                    <td th:text="${donation.id}"></td>

                    <td th:text="${donation.foodName}"></td>

                    <td th:text="${donation.donorName}"></td>

                    <td th:text="${donation.quantity}"></td>

                    <td>

                        <span class="badge bg-success"
                              th:text="${donation.status}">
                        </span>

                    </td>

                    <td th:text="${donation.pickupDate}"></td>

                    <td th:text="${donation.pickupTime}"></td>

                </tr>

                </tbody>

            </table>

            <div class="text-center mt-4">

                <a href="/login" class="btn btn-primary">
                    Back
                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
