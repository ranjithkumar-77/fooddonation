<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Donation Location</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h3>📍 Donation Location</h3>
        </div>

        <div class="card-body">

            <table class="table table-bordered">

                <tr>
                    <th>Donor</th>
                    <td th:text="${donation.donorName}"></td>
                </tr>

                <tr>
                    <th>Food</th>
                    <td th:text="${donation.foodName}"></td>
                </tr>

                <tr>
                    <th>Latitude</th>
                    <td th:text="${donation.latitude}"></td>
                </tr>

                <tr>
                    <th>Longitude</th>
                    <td th:text="${donation.longitude}"></td>
                </tr>

            </table>

            <a class="btn btn-success"
               target="_blank"
               th:href="'https://www.google.com/maps?q=' + ${donation.latitude} + ',' + ${donation.longitude}">
                📍 Open in Google Maps
            </a>

            <a href="/pending-donations"
               class="btn btn-secondary">
                ← Back
            </a>

        </div>

    </div>

</div>

</body>
</html>
