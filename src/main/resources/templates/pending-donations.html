<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pending Donations</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success">
<div class="container">
<a class="navbar-brand fw-bold" href="/">🍱 Food Donation</a>
</div>
</nav>

<div class="container mt-5">

<h2 class="text-center text-success mb-4">
Pending Donations
</h2>

<div class="card shadow">

<div class="card-body">

<div class="table-responsive">

<table class="table table-bordered table-hover align-middle text-center">

<thead class="table-success">

<tr>

<th>ID</th>
<th>Food</th>
<th>Quantity</th>
<th>Donor</th>
<th>Contact</th>
<th>Status</th>
<th>Location</th>
<th>Action</th>

</tr>

</thead>

<tbody>

<tr th:each="donation : ${donations}">

<td th:text="${donation.id}"></td>

<td th:text="${donation.foodName}"></td>

<td th:text="${donation.quantity}"></td>

<td th:text="${donation.donorName}"></td>

<td th:text="${donation.contactNumber}"></td>

<td>

<span
th:if="${donation.status=='Pending'}"
class="badge bg-warning text-dark"
th:text="${donation.status}">
</span>

<span
th:if="${donation.status=='Accepted'}"
class="badge bg-primary"
th:text="${donation.status}">
</span>

<span
th:if="${donation.status=='Pickup Scheduled'}"
class="badge bg-info"
th:text="${donation.status}">
</span>

<span
th:if="${donation.status=='Completed'}"
class="badge bg-success"
th:text="${donation.status}">
</span>

</td>

<td>

<a
th:if="${donation.latitude!=null}"
th:href="@{/view-location/{id}(id=${donation.id})}"
class="btn btn-outline-success btn-sm">

View Location

</a>

<span
th:if="${donation.latitude==null}">
No Location
</span>

</td>

<td>

<a
th:if="${donation.status=='Pending'}"
th:href="@{/accept/{id}(id=${donation.id})}"
class="btn btn-success btn-sm">

Accept

</a>

<a
th:if="${donation.status=='Accepted'}"
th:href="@{/schedule/{id}(id=${donation.id})}"
class="btn btn-primary btn-sm">

Schedule Pickup

</a>

<a
th:if="${donation.status=='Pickup Scheduled'}"
th:href="@{/complete/{id}(id=${donation.id})}"
class="btn btn-warning btn-sm">

Complete

</a>

<span
th:if="${donation.status=='Completed'}"
class="text-success fw-bold">

✔ Completed

</span>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<div class="text-center mt-4">

<a href="/login" class="btn btn-secondary">
Back
</a>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
