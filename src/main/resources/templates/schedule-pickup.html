<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Schedule Pickup</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-warning text-dark">
                    <h3>📅 Schedule Pickup</h3>
                </div>

                <div class="card-body">

                    <form action="/schedule-pickup" method="post">

                        <input type="hidden"
                               name="id"
                               th:value="${donation.id}">

                        <div class="mb-3">
                            <label class="form-label">
                                Pickup Date
                            </label>

                            <input type="date"
                                   name="pickupDate"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Pickup Time
                            </label>

                            <input type="time"
                                   name="pickupTime"
                                   class="form-control"
                                   required>

                        </div>

                        <button class="btn btn-success w-100">
                            Save Pickup Schedule
                        </button>

                    </form>

                    <br>

                    <a href="/pending-donations"
                       class="btn btn-secondary w-100">
                        ← Back
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
