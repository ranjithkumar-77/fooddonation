<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>NGO Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success">

<div class="container">

<a class="navbar-brand fw-bold" href="/">
🍱 Food Donation
</a>

<a href="/login" class="btn btn-light">
Logout
</a>

</div>

</nav>

<div class="container mt-5">

<h2 class="text-center text-success mb-4">
NGO Dashboard
</h2>

<div class="row">

<div class="col-md-4 mb-3">
<div class="card text-center shadow">
<div class="card-body">
<h3 th:text="${totalDonations}">0</h3>
<p>Total Donations</p>
</div>
</div>
</div>

<div class="col-md-4 mb-3">
<div class="card text-center shadow">
<div class="card-body">
<h3 th:text="${pendingDonations}">0</h3>
<p>Pending Donations</p>
</div>
</div>
</div>

<div class="col-md-4 mb-3">
<div class="card text-center shadow">
<div class="card-body">
<h3 th:text="${acceptedDonations}">0</h3>
<p>Accepted Donations</p>
</div>
</div>
</div>

<div class="col-md-6 mb-3">
<div class="card text-center shadow">
<div class="card-body">
<h3 th:text="${pickupScheduled}">0</h3>
<p>Pickup Scheduled</p>
</div>
</div>
</div>

<div class="col-md-6 mb-3">
<div class="card text-center shadow">
<div class="card-body">
<h3 th:text="${completedDonations}">0</h3>
<p>Completed Donations</p>
</div>
</div>
</div>

</div>

<div class="text-center mt-4">

<a href="/pending-donations"
class="btn btn-success btn-lg">
View Donations
</a>

<a href="/history"
class="btn btn-primary btn-lg">
Completed Donations
</a>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
